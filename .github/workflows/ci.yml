name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Run npm audit
        working-directory: ${{ matrix.workspace }}
        run: npm audit --omit=dev --audit-level=high

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: npm test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ${{ matrix.workspace }}
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: ${{ matrix.workspace }}
        run: npx playwright test
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/playwright-report/
          retention-days: 14

  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Build
        working-directory: ${{ matrix.workspace }}
        run: npm run build
