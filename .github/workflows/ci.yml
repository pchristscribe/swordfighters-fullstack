name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Run npm audit
        working-directory: ${{ matrix.workspace }}
        run: npm audit --production --audit-level=high

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Run tests
        working-directory: ${{ matrix.workspace }}
        run: npm test

  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        workspace: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci
      - name: Build
        working-directory: ${{ matrix.workspace }}
        run: npm run build
